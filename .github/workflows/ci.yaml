name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Setup just
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2
        with:
          tool: just

      - name: Build
        run: just build

      - name: Test
        run: just test

  release-dry-run:
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yaml
    with:
      dry_run: true

  goreleaser-dry-run:
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    uses: ./.github/workflows/goreleaser.yaml
    with:
      dry_run: true

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yaml

  goreleaser:
    needs: release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/goreleaser.yaml
    secrets: inherit
